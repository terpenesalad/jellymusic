<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>JellyMusic</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#0A0A0A;--bg2:#111111;--bg3:#181818;--bg4:#282828;--bg5:#333333;
      --accent:#E8B84B;--accent-dim:#C9962E;
      --text:#FFFFFF;--text2:#B3B3B3;--text3:#6B6B6B;
      --nav-h:64px;--mini-h:72px;--safe-b:env(safe-area-inset-bottom,0px);
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;scrollbar-width:none;}
    *::-webkit-scrollbar{display:none;}
    html,body{height:100%;overflow:hidden;}
    body{font-family:'Figtree',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;}

    .view{position:fixed;inset:0;display:none;flex-direction:column;background:var(--bg);z-index:10;}
    .view.active{display:flex;}
    .scroll-area{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
    .has-player .scroll-area{padding-bottom:calc(var(--mini-h) + var(--nav-h) + var(--safe-b) + 20px);}

    /* LOGIN */
    #view-login{justify-content:center;align-items:center;padding:32px 28px;z-index:999;
      background:radial-gradient(ellipse at top,#2a1600 0%,#0A0A0A 65%);}
    .login-mark{font-size:42px;font-weight:900;letter-spacing:-2px;margin-bottom:6px;}
    .login-mark em{color:var(--accent);font-style:normal;}
    .login-sub{color:var(--text3);font-size:14px;font-weight:500;margin-bottom:48px;}
    .login-form{width:100%;max-width:360px;display:flex;flex-direction:column;gap:10px;}
    .field-label{font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--text2);margin-bottom:4px;}
    .field-wrap{display:flex;flex-direction:column;gap:4px;}
    .login-input{background:var(--bg3);border:1.5px solid var(--bg5);border-radius:8px;padding:15px 14px;color:var(--text);font-family:inherit;font-size:15px;outline:none;transition:border-color .2s;width:100%;}
    .login-input:focus{border-color:var(--accent);}
    .login-input::placeholder{color:var(--text3);}
    .btn-connect{background:var(--accent);color:#000;border:none;border-radius:50px;padding:16px;font-family:inherit;font-size:15px;font-weight:800;cursor:pointer;margin-top:12px;transition:transform .1s,opacity .15s;}
    .btn-connect:active{transform:scale(.97);}
    .btn-connect:disabled{opacity:.6;}
    #login-err{color:#ff6060;font-size:13px;text-align:center;display:none;background:rgba(255,60,60,.1);border-radius:8px;padding:10px;}
    #login-err.show{display:block;}

    /* BOTTOM NAV */
    #bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:50;background:var(--bg2);border-top:1px solid #1c1c1c;display:none;flex-direction:column;}
    #bottom-nav.visible{display:flex;}
    .nav-row{height:var(--nav-h);display:flex;}
    .nav-safe{height:var(--safe-b);background:var(--bg2);}
    .nav-btn{flex:1;background:none;border:none;color:var(--text3);font-family:inherit;font-size:10px;font-weight:600;letter-spacing:.2px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;transition:color .15s;padding:0;text-transform:uppercase;}
    .nav-btn.active{color:var(--text);}
    .nav-btn svg{width:22px;height:22px;}
    .nav-dot{width:4px;height:4px;background:var(--accent);border-radius:50%;opacity:0;margin-top:2px;}
    .nav-btn.active .nav-dot{opacity:1;}

    /* MINI PLAYER */
    #mini-player{position:fixed;bottom:calc(var(--nav-h) + var(--safe-b));left:8px;right:8px;height:var(--mini-h);background:#242424;border-radius:14px;display:none;align-items:center;padding:0 8px;gap:10px;z-index:49;cursor:pointer;box-shadow:0 8px 30px rgba(0,0,0,.6);overflow:hidden;}
    #mini-player.visible{display:flex;}
    .mini-art{width:52px;height:52px;border-radius:8px;object-fit:cover;background:var(--bg4);flex-shrink:0;}
    .mini-info{flex:1;overflow:hidden;}
    .mini-title{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .mini-artist{font-size:12px;color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .mini-ctrls{display:flex;align-items:center;gap:2px;flex-shrink:0;}
    .mini-ctrls button{background:none;border:none;color:var(--text);cursor:pointer;padding:8px;display:flex;border-radius:50%;}
    .mini-ctrls button:active{background:rgba(255,255,255,.1);}
    .mini-ctrls svg{width:26px;height:26px;}
    .mini-progress-track{position:absolute;bottom:0;left:0;right:0;height:2px;background:rgba(255,255,255,.1);}
    .mini-progress-fill{height:100%;background:var(--accent);width:0%;border-radius:1px;}

    /* FULL PLAYER */
    #view-player{z-index:200;background:var(--bg);transform:translateY(100%);transition:transform .38s cubic-bezier(.32,.72,0,1);display:flex;}
    #view-player.open{transform:translateY(0);}
    .player-bg{position:absolute;inset:0;opacity:.2;background-size:cover;background-position:center;filter:blur(70px) saturate(1.5);}
    .player-inner{position:relative;z-index:1;display:flex;flex-direction:column;width:100%;height:100%;overflow:hidden;}
    .player-drag-handle{width:36px;height:4px;background:rgba(255,255,255,.2);border-radius:2px;margin:14px auto 0;flex-shrink:0;cursor:pointer;}
    .player-header{display:flex;align-items:center;padding:12px 20px 8px;gap:12px;flex-shrink:0;}
    .player-down-btn{background:none;border:none;color:var(--text);cursor:pointer;padding:4px;display:flex;align-items:center;}
    .player-down-btn svg{width:24px;height:24px;}
    .player-ctx{flex:1;text-align:center;}
    .player-ctx-from{font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--text2);}
    .player-ctx-name{font-size:14px;font-weight:600;margin-top:1px;}
    .player-tab-row{display:flex;border-bottom:1px solid #1c1c1c;flex-shrink:0;margin:0 20px;}
    .player-tab{flex:1;background:none;border:none;font-family:inherit;font-size:13px;font-weight:700;color:var(--text3);padding:10px 0;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s,border-color .15s;}
    .player-tab.active{color:var(--text);border-bottom-color:var(--accent);}
    #player-np{flex:1;overflow-y:auto;display:flex;flex-direction:column;}
    .player-art-wrap{padding:8px 28px 16px;flex-shrink:0;}
    .player-art{width:100%;aspect-ratio:1;border-radius:14px;object-fit:cover;background:var(--bg4);box-shadow:0 20px 60px rgba(0,0,0,.7);display:block;transition:transform .3s;}
    .player-art.playing{transform:scale(1.02);}
    .player-meta{padding:0 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
    .player-track{font-size:22px;font-weight:800;letter-spacing:-.4px;}
    .player-artist{font-size:15px;color:var(--text2);margin-top:3px;font-weight:500;}
    .btn-like{background:none;border:none;cursor:pointer;color:var(--text2);padding:4px;transition:color .15s,transform .15s;}
    .btn-like.on{color:var(--accent);}
    .btn-like:active{transform:scale(.85);}
    .btn-like svg{width:26px;height:26px;}
    .progress-wrap{padding:20px 24px 8px;flex-shrink:0;}
    .progress-track{width:100%;height:4px;background:var(--bg5);border-radius:2px;cursor:pointer;position:relative;}
    .progress-bar-fill{height:100%;background:var(--accent);border-radius:2px;position:relative;}
    .progress-knob{position:absolute;right:-6px;top:50%;transform:translateY(-50%);width:12px;height:12px;background:var(--accent);border-radius:50%;opacity:0;transition:opacity .15s;}
    .progress-track:hover .progress-knob,.progress-track:active .progress-knob{opacity:1;}
    .progress-times{display:flex;justify-content:space-between;margin-top:6px;}
    .progress-times span{font-size:12px;font-weight:600;color:var(--text3);}
    .player-controls{padding:4px 24px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
    .ctrl-side{background:none;border:none;color:var(--text3);cursor:pointer;padding:4px;display:flex;border-radius:50%;transition:color .15s;}
    .ctrl-side svg{width:24px;height:24px;}
    .ctrl-side.on{color:var(--accent);}
    .ctrl-prev,.ctrl-next{background:none;border:none;color:var(--text);cursor:pointer;padding:4px;display:flex;transition:opacity .15s;}
    .ctrl-prev:active,.ctrl-next:active{opacity:.6;}
    .ctrl-prev svg,.ctrl-next svg{width:34px;height:34px;}
    .ctrl-play{background:var(--accent);border:none;border-radius:50%;width:64px;height:64px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .1s;box-shadow:0 4px 20px rgba(232,184,75,.3);}
    .ctrl-play:active{transform:scale(.93);}
    .ctrl-play svg{width:30px;height:30px;color:#000;}
    .player-vol{padding:0 24px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
    .player-vol svg{width:18px;height:18px;color:var(--text3);flex-shrink:0;}
    .vol-track{flex:1;height:4px;background:var(--bg5);border-radius:2px;cursor:pointer;}
    .vol-fill{height:100%;background:var(--text3);border-radius:2px;width:75%;}
    #player-queue{flex:1;overflow-y:auto;display:none;flex-direction:column;padding-bottom:20px;}
    #player-queue.active{display:flex;}
    .q-section-label{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);padding:14px 20px 6px;}
    .q-row{display:flex;align-items:center;gap:12px;padding:8px 20px;cursor:pointer;}
    .q-row:active{background:var(--bg3);}
    .q-row.q-current{background:rgba(232,184,75,.07);}
    .q-row.q-current .q-name{color:var(--accent);}
    .q-art{width:46px;height:46px;border-radius:4px;object-fit:cover;background:var(--bg4);flex-shrink:0;}
    .q-info{flex:1;min-width:0;}
    .q-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .q-artist{font-size:12px;color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .q-right{flex-shrink:0;}
    .q-dur{font-size:12px;color:var(--text3);}

    /* HOME */
    .home-top{padding:56px 16px 8px;display:flex;align-items:center;justify-content:space-between;}
    .home-greeting{font-size:22px;font-weight:800;letter-spacing:-.3px;}
    .home-avatar{width:34px;height:34px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#000;cursor:pointer;text-transform:uppercase;flex-shrink:0;}
    .quick-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:8px 16px 20px;}
    .quick-card{background:var(--bg4);border-radius:8px;overflow:hidden;display:flex;align-items:center;height:56px;cursor:pointer;transition:background .12s;}
    .quick-card:active{background:#333;}
    .quick-card img{width:56px;height:56px;object-fit:cover;flex-shrink:0;}
    .quick-card-name{padding:0 10px;font-size:13px;font-weight:700;line-height:1.25;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
    .section-head{display:flex;align-items:baseline;justify-content:space-between;padding:0 16px 10px;}
    .section-title{font-size:20px;font-weight:800;letter-spacing:-.3px;}
    .section-see-all{font-size:13px;font-weight:700;color:var(--text3);background:none;border:none;font-family:inherit;cursor:pointer;}
    .shelf{display:flex;gap:12px;padding:0 16px 24px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
    .card{flex-shrink:0;width:140px;cursor:pointer;}
    .card-img{width:140px;height:140px;border-radius:8px;object-fit:cover;background:var(--bg4);display:block;}
    .card-img.circle{border-radius:50%;}
    .card-name{font-size:13px;font-weight:600;margin-top:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .card-sub{font-size:12px;color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    /* skeleton loaders for home shelves */
    .skel-shelf{display:flex;gap:12px;padding:0 16px 24px;overflow:hidden;}
    .skel-card{flex-shrink:0;width:140px;}
    .skel-img{width:140px;height:140px;border-radius:8px;background:var(--bg4);animation:shimmer 1.4s infinite;}
    .skel-line{height:12px;border-radius:4px;background:var(--bg4);margin-top:8px;animation:shimmer 1.4s infinite;}
    .skel-line.short{width:70%;}
    @keyframes shimmer{0%,100%{opacity:.5}50%{opacity:1}}

    /* SEARCH */
    .search-top{padding:52px 16px 12px;}
    .search-title{font-size:22px;font-weight:800;margin-bottom:12px;}
    .search-box{background:var(--text);border-radius:8px;display:flex;align-items:center;padding:0 12px;gap:8px;}
    .search-box svg{width:18px;height:18px;color:#555;flex-shrink:0;}
    .search-box input{border:none;background:none;outline:none;font-family:inherit;font-size:15px;color:#000;padding:12px 0;width:100%;}
    .search-box input::placeholder{color:#888;}
    .genres-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px 16px 16px;}
    .genre-pill{border-radius:10px;height:96px;display:flex;align-items:flex-end;padding:12px;cursor:pointer;}
    .genre-pill-name{font-size:15px;font-weight:800;}

    /* LIBRARY */
    .lib-top{padding:52px 16px 0;}
    .lib-top-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
    .lib-heading{font-size:22px;font-weight:800;}
    .lib-filter-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;}
    .lib-chip{border:none;border-radius:50px;padding:7px 14px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;background:var(--bg4);color:var(--text);transition:background .12s,color .12s;}
    .lib-chip.active{background:var(--accent);color:#000;}
    .lib-new-btn{background:none;border:1.5px solid var(--bg5);border-radius:50px;padding:7px 14px;font-family:inherit;font-size:13px;font-weight:700;color:var(--text2);cursor:pointer;white-space:nowrap;display:none;align-items:center;gap:5px;flex-shrink:0;}
    .lib-new-btn svg{width:14px;height:14px;}
    #lib-list{padding:4px 32px 8px 0;}
    .alpha-section-head{padding:6px 16px 4px;font-size:12px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;color:var(--accent);background:var(--bg);position:sticky;top:0;z-index:5;border-bottom:1px solid #1a1a1a;}
    .list-row{display:flex;align-items:center;padding:8px 16px;gap:12px;cursor:pointer;}
    .list-row:active{background:var(--bg3);}
    .list-art{width:52px;height:52px;border-radius:6px;object-fit:cover;background:var(--bg4);flex-shrink:0;}
    .list-art.circle{border-radius:50%;}
    .list-info{flex:1;min-width:0;}
    .list-name{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .list-sub{font-size:13px;color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .list-chev{color:var(--text3);flex-shrink:0;}
    .list-chev svg{width:18px;height:18px;}
    .lib-loading-more{text-align:center;padding:12px;font-size:12px;font-weight:600;color:var(--text3);}

    /* A-Z INDEX */
    #alpha-index{position:fixed;right:0;top:50%;transform:translateY(-50%);z-index:40;display:none;flex-direction:column;align-items:center;padding:6px 3px;user-select:none;-webkit-user-select:none;touch-action:none;}
    #alpha-index.visible{display:flex;}
    .ai-letter{font-size:10px;font-weight:800;color:var(--accent);padding:1.5px 5px;line-height:1.2;cursor:pointer;border-radius:4px;transition:background .1s;min-width:18px;text-align:center;}
    .ai-letter.ai-active{background:var(--accent);color:#000;}
    #alpha-bubble{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);width:72px;height:72px;background:var(--accent);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:900;color:#000;z-index:999;pointer-events:none;opacity:0;transition:opacity .12s;}
    #alpha-bubble.show{opacity:1;}

    /* DETAIL */
    .detail-hero{position:relative;padding:0 20px 20px;min-height:260px;display:flex;flex-direction:column;justify-content:flex-end;}
    .detail-hero-bg{position:absolute;inset:0;background-size:cover;background-position:center top;}
    .detail-hero-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.15) 0%,rgba(0,0,0,.65) 55%,var(--bg) 100%);}
    .detail-back{position:absolute;top:52px;left:16px;background:rgba(0,0,0,.5);border:none;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text);backdrop-filter:blur(6px);z-index:2;}
    .detail-back svg{width:20px;height:20px;}
    .detail-art-float{width:180px;height:180px;border-radius:10px;object-fit:cover;background:var(--bg4);display:block;margin:90px auto 16px;box-shadow:0 12px 40px rgba(0,0,0,.7);position:relative;z-index:2;}
    .detail-art-float.circle{border-radius:50%;}
    .detail-name{font-size:26px;font-weight:900;letter-spacing:-.4px;position:relative;z-index:2;}
    .detail-meta{font-size:13px;color:var(--text2);margin-top:4px;position:relative;z-index:2;}
    .detail-actions{display:flex;align-items:center;padding:12px 20px 4px;gap:16px;}
    .btn-shuffle-detail{background:none;border:none;color:var(--text2);cursor:pointer;display:flex;padding:4px;}
    .btn-shuffle-detail svg{width:26px;height:26px;}
    .btn-play-fab{margin-left:auto;background:var(--accent);border:none;border-radius:50%;width:58px;height:58px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 20px rgba(232,184,75,.4);transition:transform .1s;}
    .btn-play-fab:active{transform:scale(.92);}
    .btn-play-fab svg{width:26px;height:26px;color:#000;}

    /* TRACKS */
    .track-row{display:flex;align-items:center;padding:7px 16px;gap:12px;cursor:pointer;}
    .track-row:active{background:var(--bg3);}
    .track-row.now-playing .tr-name{color:var(--accent);}
    .tr-num{width:24px;text-align:center;font-size:15px;color:var(--text3);flex-shrink:0;}
    .tr-art{width:44px;height:44px;border-radius:4px;object-fit:cover;background:var(--bg4);flex-shrink:0;}
    .tr-info{flex:1;min-width:0;}
    .tr-name{font-size:15px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .tr-artist{font-size:13px;color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .tr-more-btn{background:none;border:none;color:var(--text3);cursor:pointer;padding:8px;flex-shrink:0;display:flex;}
    .tr-more-btn svg{width:18px;height:18px;}

    /* EQ */
    @keyframes eq1{0%,100%{height:6px}50%{height:14px}}
    @keyframes eq2{0%,100%{height:10px}50%{height:5px}}
    @keyframes eq3{0%,100%{height:8px}40%{height:14px}}
    .eq{display:flex;align-items:flex-end;gap:2px;height:14px;}
    .eq span{display:block;width:3px;border-radius:2px;background:var(--accent);}
    .eq span:nth-child(1){animation:eq1 .8s ease-in-out infinite;}
    .eq span:nth-child(2){animation:eq2 .8s ease-in-out infinite;animation-delay:.15s;}
    .eq span:nth-child(3){animation:eq3 .8s ease-in-out infinite;animation-delay:.3s;}

    /* BOTTOM SHEET */
    #sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:500;display:none;align-items:flex-end;}
    #sheet-overlay.open{display:flex;}
    .bottom-sheet{background:var(--bg3);border-radius:22px 22px 0 0;width:100%;padding-bottom:calc(var(--safe-b) + 8px);max-height:82vh;overflow-y:auto;}
    .sheet-handle{width:36px;height:4px;background:var(--bg5);border-radius:2px;margin:12px auto 16px;}
    .sheet-track-header{display:flex;align-items:center;gap:12px;padding:0 20px 16px;border-bottom:1px solid #1c1c1c;margin-bottom:8px;}
    .sheet-art{width:48px;height:48px;border-radius:6px;object-fit:cover;background:var(--bg4);flex-shrink:0;}
    .sheet-track-name{font-size:15px;font-weight:700;}
    .sheet-track-artist{font-size:13px;color:var(--text2);margin-top:2px;}
    .sheet-action{display:flex;align-items:center;gap:16px;padding:14px 20px;cursor:pointer;}
    .sheet-action:active{background:rgba(255,255,255,.04);}
    .sheet-action svg{width:22px;height:22px;color:var(--text2);flex-shrink:0;}
    .sheet-action span{font-size:15px;font-weight:500;}
    .sheet-pl-row{display:flex;align-items:center;gap:12px;padding:10px 20px;cursor:pointer;}
    .sheet-pl-row:active{background:rgba(255,255,255,.04);}
    .sheet-pl-img{width:42px;height:42px;border-radius:4px;object-fit:cover;background:var(--bg4);flex-shrink:0;}
    .sheet-pl-name{font-size:14px;font-weight:600;}

    /* MODAL */
    #modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:600;display:none;align-items:center;justify-content:center;padding:24px;}
    #modal-overlay.open{display:flex;}
    .modal-box{background:var(--bg3);border-radius:18px;padding:24px;width:100%;max-width:340px;}
    .modal-title{font-size:18px;font-weight:800;margin-bottom:16px;}
    .modal-input{background:var(--bg4);border:1.5px solid var(--bg5);border-radius:8px;padding:13px 14px;color:var(--text);font-family:inherit;font-size:15px;outline:none;width:100%;transition:border-color .2s;}
    .modal-input:focus{border-color:var(--accent);}
    .modal-input::placeholder{color:var(--text3);}
    .modal-btns{display:flex;gap:10px;margin-top:16px;}
    .modal-cancel{flex:1;background:none;border:1.5px solid var(--bg5);border-radius:50px;padding:13px;font-family:inherit;font-size:14px;font-weight:700;color:var(--text2);cursor:pointer;}
    .modal-create{flex:1;background:var(--accent);border:none;border-radius:50px;padding:13px;font-family:inherit;font-size:14px;font-weight:800;color:#000;cursor:pointer;}
    .modal-create:disabled{opacity:.5;}

    /* TOAST */
    #toast{position:fixed;bottom:calc(var(--nav-h) + var(--safe-b) + var(--mini-h) + 14px);left:50%;transform:translateX(-50%) translateY(8px);background:var(--accent);color:#000;border-radius:50px;padding:10px 20px;font-size:13px;font-weight:800;white-space:nowrap;z-index:700;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;}
    #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

    .spinner{display:flex;align-items:center;justify-content:center;padding:56px 0;}
    .spinner::after{content:'';width:34px;height:34px;border:3px solid var(--bg5);border-top-color:var(--accent);border-radius:50%;animation:spin .75s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .empty{text-align:center;padding:48px 24px;color:var(--text3);font-size:14px;font-weight:500;}
  </style>
</head>
<body>

<!-- CREATE PLAYLIST MODAL -->

      onkeydown="if(event.key==='Enter')doCreatePlaylist()">

    </div>
  </div>

<div id="toast"></div>

<script>
/* ============================================================
   STATE
============================================================ */
const S = {
  url:'', token:'', uid:'', uname:'',
  devId:'jm_'+Math.random().toString(36).slice(2,11),
  queue:[], qIdx:-1, track:null,
  ctxType:'', ctxName:'',
  shuffle:false, repeat:'off',
  libTab:'playlists',
  navStack:['home'],
  cache:{albums:[],artists:[],playlists:[],loaded:false},
  sheetTrack:null, _plPendingId:null,
};
const audio = document.getElementById('audio');

/* ============================================================
   INIT
============================================================ */
(function init(){
  const saved = localStorage.getItem('jm');
  if(saved){ try{ const d=JSON.parse(saved); Object.assign(S,{url:d.url,token:d.tok,uid:d.uid,uname:d.un}); bootApp(); }catch(e){} }
})();

/* ============================================================
   AUTH
============================================================ */
async function doLogin(){
  const btn=document.getElementById('l-btn'), err=document.getElementById('login-err');
  err.classList.remove('show'); btn.disabled=true; btn.textContent='Connecting…';
  const url=document.getElementById('l-url').value.trim().replace(/\/$/,'');
  const user=document.getElementById('l-user').value.trim();
  const pass=document.getElementById('l-pass').value;
  try{
    const r=await fetch(`${url}/Users/AuthenticateByName`,{
      method:'POST',
      headers:{'Content-Type':'application/json','X-Emby-Authorization':`MediaBrowser Client="JellyMusic",Device="Browser",DeviceId="${S.devId}",Version="1.0"`},
      body:JSON.stringify({Username:user,Pw:pass}),
    });
    if(!r.ok) throw 0;
    const d=await r.json();
    S.url=url; S.token=d.AccessToken; S.uid=d.User.Id; S.uname=d.User.Name;
    localStorage.setItem('jm',JSON.stringify({url,tok:S.token,uid:S.uid,un:S.uname}));
    bootApp();
  }catch{ err.classList.add('show'); btn.disabled=false; btn.textContent='Connect to Server'; }
}
function doLogout(){ if(!confirm('Sign out?')) return; localStorage.removeItem('jm'); location.reload(); }
function bootApp(){
  document.getElementById('view-login').style.display='none';
  document.getElementById('bottom-nav').classList.add('visible');
  gotoTab('home');
  prefetchLib(); // loads in background — home does NOT wait for this
}

/* ============================================================
   API
============================================================ */
const AH=()=>({'X-Emby-Token':S.token,'X-Emby-Authorization':`MediaBrowser Client="JellyMusic",Device="Browser",DeviceId="${S.devId}",Version="1.0"`});
async function api(path,params={}){
  const u=new URL(S.url+path);
  for(const[k,v]of Object.entries(params)) if(v!==undefined) u.searchParams.set(k,v);
  const r=await fetch(u,{headers:AH()}); if(!r.ok) throw new Error(r.status); return r.json();
}
async function apiPost(path,body={}){
  const r=await fetch(S.url+path,{method:'POST',headers:{'Content-Type':'application/json',...AH()},body:JSON.stringify(body)});
  if(!r.ok) throw new Error(r.status); const txt=await r.text(); return txt?JSON.parse(txt):null;
}

/* FAST: single large-limit call, no sequential batching */
async function fetchFast(type, limit=2000){
  const d=await api(`/Users/${S.uid}/Items`,{IncludeItemTypes:type,Recursive:true,SortBy:'SortName',Limit:limit});
  return d.Items||[];
}

function imgSrc(id,tag='Primary',sz=300){ return `${S.url}/Items/${id}/Images/${tag}?maxWidth=${sz}&maxHeight=${sz}&api_key=${S.token}`; }
function loadImg(el,id,tag='Primary',sz=300){
  if(!id){el.style.background='linear-gradient(135deg,#2a1600,#1a1a2e)';return;}
  el.src=imgSrc(id,tag,sz); el.onerror=()=>{el.src='';el.style.background='linear-gradient(135deg,#2a1600,#1a1a2e)';};
}
function audioUrl(id){ return `${S.url}/Audio/${id}/universal?api_key=${S.token}&DeviceId=${S.devId}&MaxStreamingBitrate=140000000&Container=opus,mp3,aac,m4a,flac,wav,ogg&TranscodingContainer=ts&TranscodingProtocol=hls`; }
function fmtTicks(t){const s=Math.floor((t||0)/1e7);return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;}
function fmtSecs(s){s=Math.floor(s||0);return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

/* ============================================================
   MEDIA SESSION — so the lock screen / notification shows
   the real track name, artist and album art
============================================================ */
function setMediaSession(track){
  if(!('mediaSession' in navigator)) return;
  const artists=(track.Artists||[]).join(', ')||track.AlbumArtist||'';
  const artId=track.AlbumId||track.ParentId;
  const artUrl=artId?imgSrc(artId,'Primary',512):'';
  try{
    navigator.mediaSession.metadata=new MediaMetadata({
      title: track.Name||'',
      artist: artists,
      album: track.Album||'',
      artwork: artUrl?[{src:artUrl,sizes:'512x512',type:'image/jpeg'}]:[],
    });
  }catch(e){}
  navigator.mediaSession.setActionHandler('play',()=>audio.play());
  navigator.mediaSession.setActionHandler('pause',()=>audio.pause());
  navigator.mediaSession.setActionHandler('previoustrack',prevTrack);
  navigator.mediaSession.setActionHandler('nexttrack',nextTrack);
  navigator.mediaSession.setActionHandler('seekto',(e)=>{ if(e.seekTime!=null) audio.currentTime=e.seekTime; });
  navigator.mediaSession.setActionHandler('seekbackward',(e)=>{ audio.currentTime=Math.max(0,audio.currentTime-(e.seekOffset||10)); });
  navigator.mediaSession.setActionHandler('seekforward',(e)=>{ audio.currentTime=Math.min(audio.duration||0,audio.currentTime+(e.seekOffset||10)); });
}
function updatePositionState(){
  if(!('mediaSession' in navigator)||!audio.duration) return;
  try{ navigator.mediaSession.setPositionState({duration:audio.duration,playbackRate:audio.playbackRate,position:audio.currentTime}); }catch(e){}
}

/* ============================================================
   NAVIGATION
============================================================ */
function showView(name){
  document.querySelectorAll('.view').forEach(v=>{ if(v.id!=='view-player') v.classList.remove('active'); });
  document.getElementById(`view-${name}`)?.classList.add('active');
}
function gotoTab(tab){
  S.navStack=[tab];
  ['home','search','library'].forEach(t=>document.getElementById(`nb-${t}`).classList.toggle('active',t===tab));
  showView(tab);
  document.getElementById('alpha-index').classList.toggle('visible',tab==='library');
  if(tab==='search') renderSearchBrowse();
  if(tab==='library') renderLib();
  if(tab==='home') loadHome();
}
function pushView(name){S.navStack.push(name);showView(name);document.getElementById('alpha-index').classList.remove('visible');}
function popView(){S.navStack.pop();const prev=S.navStack[S.navStack.length-1]||'home';showView(prev);document.getElementById('alpha-index').classList.toggle('visible',prev==='library');}
function openPlayer(){const p=document.getElementById('view-player');p.style.display='flex';requestAnimationFrame(()=>p.classList.add('open'));}
function closePlayer(){const p=document.getElementById('view-player');p.classList.remove('open');setTimeout(()=>{p.style.display='none';},380);}
function switchPlayerTab(tab){
  document.getElementById('ptab-np').classList.toggle('active',tab==='np');
  document.getElementById('ptab-queue').classList.toggle('active',tab==='queue');
  document.getElementById('player-np').style.display=tab==='np'?'flex':'none';
  const q=document.getElementById('player-queue'); q.style.display=tab==='queue'?'flex':'none';
  if(tab==='queue') renderFullQueue();
}

/* ============================================================
   TOAST
============================================================ */
let _tt;
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('show'),2400);}

/* ============================================================
   BOTTOM SHEET
============================================================ */
function openSheet(){document.getElementById('sheet-overlay').classList.add('open');}
function closeSheet(){document.getElementById('sheet-overlay').classList.remove('open');}
function showTrackSheet(track){
  if(!track) return;
  S.sheetTrack=track;
  const artists=(track.Artists||[]).join(', ')||track.AlbumArtist||'';
  const artId=track.AlbumId||track.ParentId;
  const sc=document.getElementById('sheet-content');
  sc.innerHTML=`
    <div class="sheet-track-header">
      <img class="sheet-art" id="sh-art">
      <div><div class="sheet-track-name">${esc(track.Name)}</div><div class="sheet-track-artist">${esc(artists)}</div></div>
    </div>
    <div class="sheet-action" onclick="addToQueue(S.sheetTrack);closeSheet();showToast('Added to queue')">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h7"/></svg>
      <span>Add to queue</span>
    </div>
    <div class="sheet-action" onclick="showAddToPlSheet(S.sheetTrack)">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
      <span>Add to playlist</span>
    </div>`;
  if(artId) loadImg(document.getElementById('sh-art'),artId,'Primary',100);
  openSheet();
}
async function showAddToPlSheet(track){
  const sc=document.getElementById('sheet-content');
  sc.innerHTML=`
    <div class="sheet-track-header">
      <div><div class="sheet-track-name">Add to playlist</div><div class="sheet-track-artist">${esc(track.Name)}</div></div>
    </div>
    <div class="sheet-action" onclick="closeSheet();showCreatePlaylist('${track.Id}')">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>

/* ============================================================

============================================================ */
let _bubTimer;
function buildAlphaIndex(letters){
  const idx=document.getElementById('alpha-index'); idx.innerHTML='';
  letters.forEach(l=>{ const el=document.createElement('div'); el.className='ai-letter'; el.textContent=l; el.dataset.l=l; idx.appendChild(el); });
  function jump(cy){
    const items=[...idx.querySelectorAll('.ai-letter')];
    let best=null,bestD=Infinity;
    items.forEach(el=>{ const r=el.getBoundingClientRect(); const d=Math.abs(cy-(r.top+r.height/2)); if(d<bestD){bestD=d;best=el;} });
    if(!best) return;
    const l=best.dataset.l;
    items.forEach(e=>e.classList.toggle('ai-active',e.dataset.l===l));
    document.getElementById(`alpha-${l}`)?.scrollIntoView({behavior:'instant'});
    const bub=document.getElementById('alpha-bubble'); bub.textContent=l; bub.classList.add('show');
    clearTimeout(_bubTimer); _bubTimer=setTimeout(()=>{bub.classList.remove('show');items.forEach(e=>e.classList.remove('ai-active'));},700);
  }
  idx.addEventListener('touchstart',e=>{e.preventDefault();jump(e.touches[0].clientY);},{passive:false});
  idx.addEventListener('touchmove', e=>{e.preventDefault();jump(e.touches[0].clientY);},{passive:false});
  idx.addEventListener('touchend', ()=>{ clearTimeout(_bubTimer); document.getElementById('alpha-bubble').classList.remove('show'); idx.querySelectorAll('.ai-letter').forEach(e=>e.classList.remove('ai-active')); });
  idx.addEventListener('click',e=>{ const l=e.target.dataset?.l; if(l) document.getElementById(`alpha-${l}`)?.scrollIntoView({behavior:'smooth'}); });
}

    }

    }

    }

    buildShelf('h-recent', recentR.Items||[], 'album');
    buildShelf('h-albums', newAlbR.Items||[], 'album');
    buildShelf('h-artists', artistR.Items||[], 'artist');

function sortKey(item){let s=(item.SortName||item.Name||'').trim().toLowerCase();s=s.replace(/^(the |a |an )/,'');return s;}
function renderLib(){
  const el=document.getElementById('lib-list');
  const isArt=S.libTab==='artists', isPl=S.libTab==='playlists';
  const items=isPl?S.cache.playlists:isArt?S.cache.artists:S.cache.albums;
  if(!items.length){el.innerHTML='<div class="spinner"></div>';return;}
  const groups={};
  items.forEach(item=>{
    const first=(sortKey(item)[0]||'').toUpperCase();
    const key=/[A-Z]/.test(first)?first:'#';
    if(!groups[key]) groups[key]=[];
    groups[key].push(item);
  });
  const letters=Object.keys(groups).sort((a,b)=>a==='#'?1:b==='#'?-1:a.localeCompare(b));
  el.innerHTML='';
  letters.forEach(letter=>{
    const hd=document.createElement('div'); hd.className='alpha-section-head'; hd.id=`alpha-${letter}`; hd.textContent=letter;
    el.appendChild(hd);
    groups[letter].forEach(item=>{
      const row=document.createElement('div'); row.className='list-row'; row.onclick=()=>isArt?openArtist(item):openAlbum(item);
      const img=document.createElement('img'); img.className='list-art'+(isArt?' circle':''); loadImg(img,item.Id);

      info.innerHTML=`<div class="list-name">${esc(item.Name)}</div><div class="list-sub">${isArt?'Artist':isPl?'Playlist':(item.ProductionYear||'Album')}</div>`;

      row.append(img,info,chev); el.appendChild(row);
    });
  });
  buildAlphaIndex(letters);
}

  const info=document.createElement('div'); info.className='tr-info';

  more.onclick=e=>{e.stopPropagation();showTrackSheet(track);};

  row.onclick=()=>{const idx=queue.findIndex(t=>t.Id===track.Id);playQueue(queue,idx>=0?idx:0,ctxType,ctxName);};
  return row;
}

============================================================ */
function playQueue(tracks,startIdx,ctxType,ctxName){S.queue=[...tracks];S.ctxType=ctxType||'';S.ctxName=ctxName||'';playIdx(startIdx);}
function playIdx(idx){
  if(idx<0||idx>=S.queue.length) return;
  S.qIdx=idx; S.track=S.queue[idx];
  audio.src=audioUrl(S.track.Id); audio.play().catch(()=>{});
  updateNowPlayingUI(); refreshTrackRows();
  setMediaSession(S.track);  // ← updates lock screen / notification
}
function addToQueue(track){
  if(!track) return;
  if(!S.queue.length){S.queue=[track];S.qIdx=0;playIdx(0);return;}
  S.queue.splice(S.qIdx+1,0,track);
  if(document.getElementById('player-queue').style.display==='flex') renderFullQueue();
}
function updateNowPlayingUI(){
  const t=S.track; if(!t) return;
  const artists=(t.Artists||[]).join(', ')||t.AlbumArtist||'';
  const artId=t.AlbumId||t.ParentId;
  const artUrl=artId?imgSrc(artId,'Primary',500):'';
  document.getElementById('p-track').textContent=t.Name;
  document.getElementById('p-artist').textContent=artists;
  document.getElementById('p-from').textContent='Playing from '+(S.ctxType||'').toLowerCase();
  document.getElementById('p-ctx-name').textContent=S.ctxName;
  document.getElementById('p-art').src=artUrl;
  document.getElementById('p-art').onerror=()=>{document.getElementById('p-art').src='';};
  document.getElementById('player-bg').style.backgroundImage=artUrl?`url(${artUrl})`:'none';
  document.getElementById('p-art').classList.add('playing');
  document.getElementById('mini-title').textContent=t.Name;
  document.getElementById('mini-artist').textContent=artists;
  document.getElementById('mini-art').src=artId?imgSrc(artId,'Primary',100):'';
  document.getElementById('mini-player').classList.add('visible');
  if(document.getElementById('player-queue').style.display==='flex') renderFullQueue();
}
function renderFullQueue(){
  const el=document.getElementById('queue-list-inner'); el.innerHTML='';
  document.getElementById('q-count').textContent=S.queue.length;
  if(!S.queue.length){el.innerHTML='<div class="empty">Queue is empty</div>';return;}
  S.queue.forEach((t,i)=>{
    const cur=i===S.qIdx;
    const row=document.createElement('div'); row.className='q-row'+(cur?' q-current':'');
    const artId=t.AlbumId||t.ParentId;
    const img=document.createElement('img'); img.className='q-art'; if(artId) loadImg(img,artId,'Primary',80);
    const info=document.createElement('div'); info.className='q-info';
    const artists=(t.Artists||[]).join(', ')||t.AlbumArtist||'';
    info.innerHTML=`<div class="q-name">${esc(t.Name)}</div><div class="q-artist">${esc(artists)}</div>`;
    const right=document.createElement('div'); right.className='q-right';
    right.innerHTML=cur?'<div class="eq"><span></span><span></span><span></span></div>':`<span class="q-dur">${fmtTicks(t.RunTimeTicks)}</span>`;
    row.append(img,info,right); row.onclick=()=>playIdx(i); el.appendChild(row);
  });
  setTimeout(()=>{const cur=el.querySelector('.q-current');if(cur)cur.scrollIntoView({behavior:'smooth',block:'center'});},80);
}
function refreshTrackRows(){
  document.querySelectorAll('.track-row').forEach(r=>{
    r.classList.remove('now-playing');
    const n=r.querySelector('.tr-num'); if(n&&n.querySelector('.eq')) n.innerHTML=n.dataset.orig||'';
  });
  if(S.track){
    const el=document.getElementById(`tr-${S.track.Id}`);
    if(el){el.classList.add('now-playing');const n=el.querySelector('.tr-num');if(n){n.dataset.orig=n.textContent;n.innerHTML='<div class="eq"><span></span><span></span><span></span></div>';}}
  }
}
function updatePlayIcons(){
  const pp=audio.paused?'M8 5v14l11-7z':'M6 19h4V5H6v14zm8-14v14h4V5h-4z';
  document.getElementById('ctrl-play-icon').innerHTML=`<path d="${pp}"/>`;
  document.getElementById('mini-play-icon').innerHTML=`<path d="${pp}"/>`;
  document.getElementById('p-art').classList.toggle('playing',!audio.paused);
  // Update media session playback state
  if('mediaSession' in navigator) navigator.mediaSession.playbackState=audio.paused?'paused':'playing';
}
function togglePlay(){if(!S.track) return;audio.paused?audio.play():audio.pause();}
function nextTrack(){let ni=S.qIdx+1;if(S.shuffle)ni=Math.floor(Math.random()*S.queue.length);if(ni>=S.queue.length){if(S.repeat==='all')ni=0;else return;}playIdx(ni);}
function prevTrack(){if(audio.currentTime>3){audio.currentTime=0;return;}let pi=S.qIdx-1;if(pi<0)pi=S.repeat==='all'?S.queue.length-1:0;playIdx(pi);}
function toggleShuffle(){S.shuffle=!S.shuffle;document.getElementById('ctrl-shuffle').classList.toggle('on',S.shuffle);}
function updateShuffleUI(){document.getElementById('ctrl-shuffle').classList.toggle('on',S.shuffle);}
function toggleRepeat(){const m=['off','all','one'];S.repeat=m[(m.indexOf(S.repeat)+1)%3];document.getElementById('ctrl-repeat').classList.toggle('on',S.repeat!=='off');}
function toggleLike(){const btn=document.getElementById('p-like'),icon=document.getElementById('p-like-icon');btn.classList.toggle('on');icon.setAttribute('fill',btn.classList.contains('on')?'currentColor':'none');}
function seekClick(e){if(!audio.duration)return;const r=e.currentTarget.getBoundingClientRect();audio.currentTime=((e.clientX-r.left)/r.width)*audio.duration;}
function setVol(e){const r=e.currentTarget.getBoundingClientRect();const v=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width));audio.volume=v;document.getElementById('vol-fill').style.width=(v*100)+'%';}

audio.addEventListener('play',updatePlayIcons);
audio.addEventListener('pause',updatePlayIcons);
audio.addEventListener('ended',()=>{if(S.repeat==='one'){audio.currentTime=0;audio.play();return;}nextTrack();});
audio.addEventListener('timeupdate',()=>{
  if(!audio.duration) return;
  const pct=(audio.currentTime/audio.duration)*100;
  document.getElementById('p-fill').style.width=pct+'%';
  document.getElementById('mini-prog').style.width=pct+'%';
  document.getElementById('p-cur').textContent=fmtSecs(audio.currentTime);
  document.getElementById('p-dur').textContent=fmtSecs(audio.duration);
  updatePositionState(); // keeps lock screen scrubber in sync
});
audio.addEventListener('error',()=>setTimeout(nextTrack,1200));

document.getElementById('player-np').style.display='flex';
document.getElementById('player-queue').style.display='none';
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>JellyMusic</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0A0A0A;
      --bg2: #111111;
      --bg3: #181818;
      --bg4: #282828;
      --bg5: #333333;
      --accent: #1DB954;
      --accent-dim: #169a44;
      --text: #FFFFFF;
      --text2: #B3B3B3;
      --text3: #6B6B6B;
      --nav-h: 64px;
      --mini-h: 72px;
      --safe-b: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Figtree', sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    /* ======= VIEWS ======= */
    .view {
      position: fixed;
      inset: 0;
      display: none;
      flex-direction: column;
      background: var(--bg);
      z-index: 10;
    }
    .view.active { display: flex; }

    .scroll-area {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .scroll-area::-webkit-scrollbar { display: none; }
    .has-player .scroll-area {
      padding-bottom: calc(var(--mini-h) + var(--nav-h) + var(--safe-b) + 20px);
    }

    /* ======= STATUS BAR SPACER ======= */
    .status-pad { padding-top: 52px; }

    /* ======= LOGIN ======= */
    #view-login {
      justify-content: center;
      align-items: center;
      background: radial-gradient(ellipse at top, #0d2f1c 0%, #0A0A0A 65%);
      padding: 32px 28px;
      gap: 0;
      z-index: 999;
    }
    .login-mark {
      font-size: 42px;
      font-weight: 900;
      letter-spacing: -2px;
      margin-bottom: 6px;
    }
    .login-mark em { color: var(--accent); font-style: normal; }
    .login-sub {
      color: var(--text3);
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 52px;
      letter-spacing: 0.2px;
    }
    .login-form {
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .field-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--text2);
      margin-bottom: 4px;
    }
    .field-wrap { display: flex; flex-direction: column; gap: 4px; }
    .login-input {
      background: var(--bg3);
      border: 1.5px solid var(--bg5);
      border-radius: 8px;
      padding: 15px 14px;
      color: var(--text);
      font-family: inherit;
      font-size: 15px;
      outline: none;
      transition: border-color .2s;
      width: 100%;
    }
    .login-input:focus { border-color: var(--accent); }
    .login-input::placeholder { color: var(--text3); }
    .btn-connect {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 50px;
      padding: 16px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      margin-top: 12px;
      transition: transform .1s, background .15s, opacity .15s;
      letter-spacing: 0.3px;
    }
    .btn-connect:active { transform: scale(.97); background: var(--accent-dim); }
    .btn-connect:disabled { opacity: .6; }
    #login-err {
      color: #ff6060;
      font-size: 13px;
      font-weight: 500;
      text-align: center;
      display: none;
      background: rgba(255,60,60,.1);
      border-radius: 8px;
      padding: 10px;
    }
    #login-err.show { display: block; }

    /* ======= BOTTOM NAV ======= */
    #bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 50;
      background: var(--bg2);
      border-top: 1px solid #1c1c1c;
      display: none;
      flex-direction: column;
    }
    #bottom-nav.visible { display: flex; }
    .nav-row {
      height: var(--nav-h);
      display: flex;
      padding-bottom: 0;
    }
    .nav-safe { height: var(--safe-b); background: var(--bg2); }
    .nav-btn {
      flex: 1;
      background: none;
      border: none;
      color: var(--text3);
      font-family: inherit;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.2px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      transition: color .15s;
      padding: 0;
      text-transform: uppercase;
    }
    .nav-btn.active { color: var(--text); }
    .nav-btn svg { width: 22px; height: 22px; }
    .nav-dot {
      width: 4px; height: 4px;
      background: var(--accent);
      border-radius: 50%;
      opacity: 0;
      margin-top: 2px;
    }
    .nav-btn.active .nav-dot { opacity: 1; }

    /* ======= MINI PLAYER ======= */
    #mini-player {
      position: fixed;
      bottom: calc(var(--nav-h) + var(--safe-b));
      left: 8px; right: 8px;
      height: var(--mini-h);
      background: #2a2a2a;
      border-radius: 14px;
      display: none;
      align-items: center;
      padding: 0 8px 0 8px;
      gap: 10px;
      z-index: 49;
      cursor: pointer;
      box-shadow: 0 8px 30px rgba(0,0,0,.6);
      overflow: hidden;
    }
    #mini-player.visible { display: flex; }
    #mini-player::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--mini-bg, transparent);
      opacity: .15;
      border-radius: 14px;
    }
    .mini-art {
      width: 52px; height: 52px;
      border-radius: 8px;
      object-fit: cover;
      background: var(--bg4);
      flex-shrink: 0;
      position: relative;
      z-index: 1;
    }
    .mini-info {
      flex: 1;
      overflow: hidden;
      position: relative;
      z-index: 1;
    }
    .mini-title {
      font-size: 14px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .mini-artist {
      font-size: 12px;
      color: var(--text2);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .mini-ctrls {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
      position: relative;
      z-index: 1;
    }
    .mini-ctrls button {
      background: none; border: none;
      color: var(--text); cursor: pointer;
      padding: 8px; display: flex;
      border-radius: 50%;
    }
    .mini-ctrls button:active { background: rgba(255,255,255,.1); }
    .mini-ctrls svg { width: 26px; height: 26px; }
    .mini-progress-track {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2px; background: rgba(255,255,255,.1);
    }
    .mini-progress-fill {
      height: 100%;
      background: var(--accent);
      width: 0%;
      border-radius: 1px;
    }

    /* ======= FULL PLAYER ======= */
    #view-player {
      z-index: 200;
      background: var(--bg);
      transform: translateY(100%);
      transition: transform .38s cubic-bezier(.32,.72,0,1);
      display: flex;
    }
    #view-player.open {
      transform: translateY(0);
    }
    .player-bg {
      position: absolute;
      inset: 0;
      opacity: .25;
      background-size: cover;
      background-position: center;
      filter: blur(60px) saturate(2);
    }
    .player-inner {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
    }
    .player-drag-handle {
      width: 36px; height: 4px;
      background: rgba(255,255,255,.25);
      border-radius: 2px;
      margin: 14px auto 0;
    }
    .player-header {
      display: flex;
      align-items: center;
      padding: 12px 20px 8px;
      gap: 12px;
    }
    .player-down-btn {
      background: none; border: none;
      color: var(--text); cursor: pointer; padding: 4px;
    }
    .player-down-btn svg { width: 24px; height: 24px; }
    .player-ctx {
      flex: 1;
      text-align: center;
    }
    .player-ctx-from {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--text2);
    }
    .player-ctx-name {
      font-size: 14px;
      font-weight: 600;
      margin-top: 1px;
    }
    .player-more-btn {
      background: none; border: none;
      color: var(--text); cursor: pointer; padding: 4px;
      display: flex; flex-direction: column; gap: 4px; align-items: center;
    }
    .player-more-btn span {
      display: block; width: 4px; height: 4px;
      background: var(--text); border-radius: 50%;
    }
    .player-art-wrap {
      padding: 8px 28px 20px;
    }
    .player-art {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 14px;
      object-fit: cover;
      background: var(--bg4);
      box-shadow: 0 20px 60px rgba(0,0,0,.7);
      display: block;
      transition: transform .3s;
    }
    .player-art.playing { transform: scale(1.02); }
    .player-meta {
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .player-meta-text {}
    .player-track { font-size: 22px; font-weight: 800; letter-spacing: -.4px; }
    .player-artist { font-size: 15px; color: var(--text2); margin-top: 3px; font-weight: 500; }
    .btn-like {
      background: none; border: none; cursor: pointer;
      color: var(--text2); padding: 4px;
      transition: color .15s, transform .15s;
    }
    .btn-like.on { color: var(--accent); }
    .btn-like:active { transform: scale(.85); }
    .btn-like svg { width: 26px; height: 26px; }
    .progress-wrap {
      padding: 20px 24px 8px;
    }
    .progress-track {
      width: 100%; height: 4px;
      background: var(--bg5);
      border-radius: 2px;
      cursor: pointer;
      position: relative;
    }
    .progress-track:active .progress-knob { opacity: 1; }
    .progress-bar-fill {
      height: 100%;
      background: var(--text);
      border-radius: 2px;
      position: relative;
    }
    .progress-knob {
      position: absolute;
      right: -6px; top: 50%;
      transform: translateY(-50%);
      width: 12px; height: 12px;
      background: var(--text);
      border-radius: 50%;
      opacity: 0;
      transition: opacity .15s;
    }
    .progress-track:hover .progress-knob { opacity: 1; }
    .progress-times {
      display: flex; justify-content: space-between;
      margin-top: 6px;
    }
    .progress-times span {
      font-size: 12px; font-weight: 600;
      color: var(--text3);
    }
    .player-controls {
      padding: 4px 24px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .ctrl-side {
      background: none; border: none;
      color: var(--text3); cursor: pointer; padding: 4px;
      display: flex; border-radius: 50%;
      transition: color .15s;
    }
    .ctrl-side svg { width: 24px; height: 24px; }
    .ctrl-side.on { color: var(--accent); }
    .ctrl-prev, .ctrl-next {
      background: none; border: none;
      color: var(--text); cursor: pointer; padding: 4px;
      display: flex;
      transition: opacity .15s;
    }
    .ctrl-prev:active, .ctrl-next:active { opacity: .6; }
    .ctrl-prev svg, .ctrl-next svg { width: 34px; height: 34px; }
    .ctrl-play {
      background: var(--text);
      border: none;
      border-radius: 50%;
      width: 64px; height: 64px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: transform .1s;
    }
    .ctrl-play:active { transform: scale(.93); }
    .ctrl-play svg { width: 30px; height: 30px; color: #000; }
    .player-vol {
      padding: 0 24px 20px;
      display: flex; align-items: center; gap: 10px;
    }
    .player-vol svg { width: 18px; height: 18px; color: var(--text3); flex-shrink: 0; }
    .vol-track {
      flex: 1; height: 4px;
      background: var(--bg5); border-radius: 2px; cursor: pointer;
    }
    .vol-fill {
      height: 100%; background: var(--text3);
      border-radius: 2px; width: 75%;
    }
    .player-queue-area {
      padding: 0 24px;
      flex: 1;
      overflow: hidden;
    }
    .queue-heading {
      font-size: 13px; font-weight: 700;
      letter-spacing: .8px;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 10px;
    }
    .queue-list { display: flex; flex-direction: column; gap: 0; }
    .queue-row {
      display: flex; align-items: center; gap: 10px;
      padding: 7px 0; cursor: pointer;
    }
    .queue-row:active { opacity: .7; }
    .queue-art {
      width: 38px; height: 38px;
      border-radius: 4px;
      object-fit: cover; background: var(--bg4);
      flex-shrink: 0;
    }
    .queue-name { font-size: 13px; font-weight: 600; }
    .queue-artist { font-size: 12px; color: var(--text2); }

    /* ======= HOME ======= */
    .home-top {
      padding: 56px 16px 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .home-greeting { font-size: 22px; font-weight: 800; letter-spacing: -.3px; }
    .home-avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 800; color: #000; cursor: pointer;
      text-transform: uppercase;
    }
    .quick-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      padding: 8px 16px 20px;
    }
    .quick-card {
      background: var(--bg4);
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      align-items: center;
      height: 56px;
      cursor: pointer;
      transition: background .12s;
    }
    .quick-card:active { background: #333; }
    .quick-card img {
      width: 56px; height: 56px;
      object-fit: cover;
      flex-shrink: 0;
    }
    .quick-card .q-name {
      padding: 0 10px;
      font-size: 13px;
      font-weight: 700;
      line-height: 1.25;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .section-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 0 16px 10px;
    }
    .section-title { font-size: 20px; font-weight: 800; letter-spacing: -.3px; }
    .section-see-all {
      font-size: 13px; font-weight: 700;
      color: var(--text3); background: none; border: none;
      font-family: inherit; cursor: pointer;
    }
    .shelf {
      display: flex; gap: 12px;
      padding: 0 16px 24px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .shelf::-webkit-scrollbar { display: none; }
    .card {
      flex-shrink: 0; width: 140px; cursor: pointer;
    }
    .card-img {
      width: 140px; height: 140px;
      border-radius: 8px;
      object-fit: cover;
      background: var(--bg4);
      display: block;
    }
    .card-img.circle { border-radius: 50%; }
    .card-name {
      font-size: 13px; font-weight: 600;
      margin-top: 8px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .card-sub {
      font-size: 12px; color: var(--text2);
      margin-top: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* ======= SEARCH ======= */
    .search-top {
      padding: 52px 16px 12px;
    }
    .search-title { font-size: 22px; font-weight: 800; margin-bottom: 12px; }
    .search-box {
      background: var(--text);
      border-radius: 8px;
      display: flex; align-items: center;
      padding: 0 12px; gap: 8px;
    }
    .search-box svg { width: 18px; height: 18px; color: #555; flex-shrink: 0; }
    .search-box input {
      border: none; background: none; outline: none;
      font-family: inherit; font-size: 15px;
      color: #000; padding: 12px 0; width: 100%;
    }
    .search-box input::placeholder { color: #888; }
    .genres-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 12px 16px 16px;
    }
    .genre-pill {
      border-radius: 10px;
      height: 96px;
      display: flex; align-items: flex-end;
      padding: 12px; cursor: pointer; overflow: hidden;
    }
    .genre-pill-name { font-size: 15px; font-weight: 800; }

    /* ======= LIBRARY ======= */
    .lib-top { padding: 52px 16px 0; }
    .lib-top-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .lib-heading { font-size: 22px; font-weight: 800; }
    .lib-filter-row {
      display: flex; gap: 8px;
      overflow-x: auto; padding-bottom: 8px;
      scrollbar-width: none;
    }
    .lib-filter-row::-webkit-scrollbar { display: none; }
    .lib-chip {
      border: none; border-radius: 50px;
      padding: 7px 14px;
      font-family: inherit; font-size: 13px; font-weight: 700;
      cursor: pointer; white-space: nowrap; flex-shrink: 0;
      background: var(--bg4); color: var(--text);
      transition: background .12s, color .12s;
    }
    .lib-chip.active { background: var(--text); color: #000; }
    .lib-list { padding: 8px 0; }
    .list-row {
      display: flex; align-items: center;
      padding: 8px 16px; gap: 12px;
      cursor: pointer;
    }
    .list-row:active { background: var(--bg3); }
    .list-art {
      width: 54px; height: 54px;
      border-radius: 6px; object-fit: cover;
      background: var(--bg4); flex-shrink: 0;
    }
    .list-art.circle { border-radius: 50%; }
    .list-info { flex: 1; overflow: hidden; }
    .list-name {
      font-size: 15px; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .list-sub {
      font-size: 13px; color: var(--text2);
      margin-top: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .list-chev { color: var(--text3); flex-shrink: 0; }
    .list-chev svg { width: 18px; height: 18px; }

    /* ======= DETAIL (Artist / Album / Playlist) ======= */
    .detail-hero {
      position: relative;
      padding: 0 20px 20px;
      min-height: 260px;
      display: flex; flex-direction: column; justify-content: flex-end;
    }
    .detail-hero-bg {
      position: absolute; inset: 0;
      background-size: cover; background-position: center top;
      filter: blur(0px);
    }
    .detail-hero-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,.2) 0%, rgba(0,0,0,.7) 60%, var(--bg) 100%);
    }
    .detail-back {
      position: absolute; top: 52px; left: 16px;
      background: rgba(0,0,0,.5); border: none; border-radius: 50%;
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--text);
      backdrop-filter: blur(4px);
      z-index: 2;
    }
    .detail-back svg { width: 20px; height: 20px; }
    .detail-art-float {
      width: 180px; height: 180px;
      border-radius: 10px; object-fit: cover;
      background: var(--bg4);
      display: block;
      margin: 0 auto 16px;
      box-shadow: 0 12px 40px rgba(0,0,0,.7);
      position: relative; z-index: 2;
      margin-top: 90px;
    }
    .detail-art-float.circle { border-radius: 50%; }
    .detail-name {
      font-size: 26px; font-weight: 900;
      letter-spacing: -.4px;
      position: relative; z-index: 2;
    }
    .detail-meta {
      font-size: 13px; color: var(--text2);
      margin-top: 4px;
      position: relative; z-index: 2;
    }
    .detail-actions {
      display: flex; align-items: center;
      padding: 12px 20px 4px; gap: 16px;
    }
    .btn-outline {
      background: none;
      border: 1.5px solid rgba(255,255,255,.35);
      border-radius: 50px;
      padding: 8px 20px;
      color: var(--text);
      font-family: inherit; font-size: 13px; font-weight: 700;
      cursor: pointer;
    }
    .btn-shuffle-detail {
      background: none; border: none; color: var(--text2);
      cursor: pointer; display: flex; padding: 4px;
    }
    .btn-shuffle-detail svg { width: 26px; height: 26px; }
    .btn-play-fab {
      margin-left: auto;
      background: var(--accent); border: none; border-radius: 50%;
      width: 58px; height: 58px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(29,185,84,.4);
      transition: transform .1s, background .15s;
    }
    .btn-play-fab:active { transform: scale(.92); }
    .btn-play-fab svg { width: 26px; height: 26px; color: #000; }

    /* Tracks */
    .track-row {
      display: flex; align-items: center;
      padding: 7px 16px; gap: 12px;
      cursor: pointer;
    }
    .track-row:active { background: var(--bg3); }
    .track-row.now-playing .tr-name { color: var(--accent); }
    .tr-num {
      width: 24px; text-align: center;
      font-size: 15px; color: var(--text3);
      flex-shrink: 0;
    }
    .tr-art {
      width: 44px; height: 44px;
      border-radius: 4px; object-fit: cover;
      background: var(--bg4); flex-shrink: 0;
    }
    .tr-info { flex: 1; overflow: hidden; }
    .tr-name {
      font-size: 15px; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .tr-artist {
      font-size: 13px; color: var(--text2); margin-top: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .tr-dur { font-size: 13px; color: var(--text3); flex-shrink: 0; }

    /* EQ Bars */
    @keyframes eq1 { 0%,100%{height:6px} 50%{height:14px} }
    @keyframes eq2 { 0%,100%{height:10px} 50%{height:5px} }
    @keyframes eq3 { 0%,100%{height:8px} 40%{height:14px} }
    .eq { display:flex; align-items:flex-end; gap:2px; height:14px; }
    .eq span {
      display:block; width:3px; border-radius:2px; background:var(--accent);
    }
    .eq span:nth-child(1) { animation:eq1 .8s ease-in-out infinite; }
    .eq span:nth-child(2) { animation:eq2 .8s ease-in-out infinite; animation-delay:.15s; }
    .eq span:nth-child(3) { animation:eq3 .8s ease-in-out infinite; animation-delay:.3s; }

    /* Utils */
    .spinner {
      display:flex; align-items:center; justify-content:center;
      padding:56px 0;
    }
    .spinner::after {
      content:'';
      width:34px; height:34px;
      border:3px solid var(--bg5);
      border-top-color:var(--accent);
      border-radius:50%;
      animation:spin .75s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
    .empty {
      text-align:center; padding:48px 24px;
      color:var(--text3); font-size:14px; font-weight:500;
    }

    /* Scrollbar hidden on all overflow elements */
    * { scrollbar-width: none; }
    *::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>

<!-- ======= LOGIN ======= -->
<div id="view-login" class="view active">
  <div class="login-mark">Jelly<em>Music</em></div>
  <div class="login-sub">Your Jellyfin, beautifully</div>

<!-- ======= HOME ======= -->

<div id="view-search" class="view has-player">

<div id="view-library" class="view has-player">

      </div>

        <button class="lib-chip active" onclick="setLibTab('playlists',this)">Playlists</button>
        <button class="lib-chip" onclick="setLibTab('albums',this)">Albums</button>

</div>

<!-- ======= ALBUM / PLAYLIST DETAIL ======= -->

</div>

<!-- ======= FULL PLAYER ======= -->
<div id="view-player" class="view">
  <div class="player-bg" id="player-bg"></div>
  <div class="player-inner">
    <div class="player-drag-handle" onclick="closePlayer()"></div>

      <div class="player-ctx">
        <div class="player-ctx-from" id="p-from">Playing from album</div>
        <div class="player-ctx-name" id="p-ctx-name"></div>

<!-- ======= MINI PLAYER ======= -->

<script>
/* =====================================================
   STATE
===================================================== */
const S = {
  url: '', token: '', uid: '', uname: '',
  devId: 'jm_' + Math.random().toString(36).slice(2, 11),
  queue: [], qIdx: -1, track: null,
  ctxType: '', ctxName: '',
  shuffle: false, repeat: 'off', // off all one
  libTab: 'playlists',
  navStack: ['home'],
  cache: { albums: [], artists: [], playlists: [] },
};

const audio = document.getElementById('audio');

/* =====================================================
   INIT
===================================================== */
(function init() {
  const saved = localStorage.getItem('jm');
  if (saved) {
    try {
      const d = JSON.parse(saved);
      Object.assign(S, { url: d.url, token: d.tok, uid: d.uid, uname: d.un });
      bootApp();
    } catch(e) { /* ignore */ }
  }
})();

/* =====================================================
   AUTH
===================================================== */
async function doLogin() {
  const btn = document.getElementById('l-btn');
  const err = document.getElementById('login-err');
  err.classList.remove('show');
  btn.disabled = true; btn.textContent = 'Connecting…';

  const url = document.getElementById('l-url').value.trim().replace(/\/$/, '');
  const user = document.getElementById('l-user').value.trim();
  const pass = document.getElementById('l-pass').value;

  try {
    const r = await fetch(`${url}/Users/AuthenticateByName`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Emby-Authorization': `MediaBrowser Client="JellyMusic",Device="Browser",DeviceId="${S.devId}",Version="1.0"`,
      },
      body: JSON.stringify({ Username: user, Pw: pass }),
    });
    if (!r.ok) throw 0;
    const d = await r.json();
    S.url = url; S.token = d.AccessToken; S.uid = d.User.Id; S.uname = d.User.Name;
    localStorage.setItem('jm', JSON.stringify({ url, tok: S.token, uid: S.uid, un: S.uname }));
    bootApp();
  } catch {
    err.classList.add('show');
    btn.disabled = false; btn.textContent = 'Connect to Server';
  }
}

function doLogout() {
  if (!confirm('Sign out?')) return;
  localStorage.removeItem('jm');
  location.reload();
}

function bootApp() {
  document.getElementById('view-login').style.display = 'none';
  document.getElementById('bottom-nav').classList.add('visible');
  gotoTab('home');
  prefetchLib();
}

/* =====================================================
   API
===================================================== */
async function api(path, params = {}) {
  const u = new URL(S.url + path);
  for (const [k, v] of Object.entries(params)) if (v !== undefined) u.searchParams.set(k, v);
  const r = await fetch(u, {
    headers: {
      'X-Emby-Token': S.token,
      'X-Emby-Authorization': `MediaBrowser Client="JellyMusic",Device="Browser",DeviceId="${S.devId}",Version="1.0"`,
    }
  });
  if (!r.ok) throw new Error(r.status);
  return r.json();
}

function imgSrc(id, tag = 'Primary', sz = 300) {
  return `${S.url}/Items/${id}/Images/${tag}?maxWidth=${sz}&maxHeight=${sz}&api_key=${S.token}`;
}

function loadImg(el, id, tag = 'Primary', sz = 300) {
  el.src = imgSrc(id, tag, sz);
  el.onerror = () => { el.src = ''; el.style.background = 'linear-gradient(135deg,#1a2e1a,#1a1a2e)'; };
}

function audioUrl(id) {
  return `${S.url}/Audio/${id}/universal?api_key=${S.token}&DeviceId=${S.devId}&MaxStreamingBitrate=140000000&Container=opus,mp3,aac,m4a,flac,wav,ogg&TranscodingContainer=ts&TranscodingProtocol=hls`;
}

function fmtTicks(t) {
  const s = Math.floor((t || 0) / 1e7);
  return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
}
function fmtSecs(s) {
  s = Math.floor(s || 0);
  return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
}

/* =====================================================
   NAVIGATION
===================================================== */
function showView(name) {
  document.querySelectorAll('.view').forEach(v => {
    if (v.id === 'view-player') return; // player controlled separately
    v.classList.remove('active');
  });
  const el = document.getElementById(`view-${name}`);
  if (el) el.classList.add('active');
}

function gotoTab(tab) {
  S.navStack = [tab];
  ['home','search','library'].forEach(t => {
    document.getElementById(`nb-${t}`).classList.toggle('active', t === tab);
  });
  showView(tab);
  if (tab === 'search') renderSearchBrowse();
  if (tab === 'library') renderLib();
}

function pushView(name) {
  S.navStack.push(name);
  showView(name);
}

function popView() {
  S.navStack.pop();
  const prev = S.navStack[S.navStack.length - 1] || 'home';
  showView(prev);
}

function openPlayer() {
  const p = document.getElementById('view-player');
  p.style.display = 'flex';
  requestAnimationFrame(() => p.classList.add('open'));
}

function closePlayer() {
  const p = document.getElementById('view-player');
  p.classList.remove('open');
  setTimeout(() => { p.style.display = 'none'; }, 380);
}

/* =====================================================
   HOME
===================================================== */
async function loadHome() {
  const hr = new Date().getHours();
  const greet = hr < 12 ? 'Good morning' : hr < 17 ? 'Good afternoon' : 'Good evening';
  document.getElementById('home-greeting').textContent = greet + ', ' + S.uname;
  document.getElementById('home-avatar').textContent = S.uname[0] || 'U';

  // Recent albums for quick grid
  try {
    const recent = await api(`/Users/${S.uid}/Items`, {
      SortBy: 'DatePlayed', SortOrder: 'Descending',
      IncludeItemTypes: 'MusicAlbum', Recursive: true, Limit: 6,
    });
    const qg = document.getElementById('home-quick');
    qg.innerHTML = '';
    (recent.Items || []).slice(0, 6).forEach(item => {
      const d = document.createElement('div');
      d.className = 'quick-card';
      d.onclick = () => openAlbum(item);
      const img = document.createElement('img');
      loadImg(img, item.Id);
      const n = document.createElement('div');
      n.className = 'q-name';
      n.textContent = item.Name;
      d.append(img, n);
      qg.appendChild(d);
    });
  } catch {}

  const sec = document.getElementById('home-sections');
  sec.innerHTML = '';

  // New albums shelf
  try {
    const albs = await api(`/Users/${S.uid}/Items`, {
      SortBy: 'DateCreated', SortOrder: 'Descending',
      IncludeItemTypes: 'MusicAlbum', Recursive: true, Limit: 15,
    });
    S.cache.albums = albs.Items || [];
    if (S.cache.albums.length) {
      sec.innerHTML += `<div class="section-head"><span class="section-title">New Releases</span><button class="section-see-all" onclick="gotoTab('library')">See all</button></div>`;
      sec.innerHTML += `<div class="shelf" id="h-albums"></div>`;
      buildShelf('h-albums', S.cache.albums, 'album');
    }
  } catch {}

  // Artists shelf
  try {
    const arts = await api(`/Users/${S.uid}/Items`, {
      SortBy: 'Random', IncludeItemTypes: 'MusicArtist', Recursive: true, Limit: 15,
    });
    S.cache.artists = arts.Items || [];
    if (S.cache.artists.length) {
      sec.innerHTML += `<div class="section-head"><span class="section-title">Your Artists</span><button class="section-see-all" onclick="gotoTab('library')">See all</button></div>`;
      sec.innerHTML += `<div class="shelf" id="h-artists"></div>`;
      buildShelf('h-artists', S.cache.artists, 'artist');
    }
  } catch {}

  // Playlists shelf
  try {
    const pls = await api(`/Users/${S.uid}/Items`, {
      IncludeItemTypes: 'Playlist', Recursive: true, Limit: 15,
    });
    S.cache.playlists = pls.Items || [];
    if (S.cache.playlists.length) {
      sec.innerHTML += `<div class="section-head"><span class="section-title">Playlists</span><button class="section-see-all" onclick="gotoTab('library')">See all</button></div>`;
      sec.innerHTML += `<div class="shelf" id="h-pls"></div>`;
      buildShelf('h-pls', S.cache.playlists, 'album');
    }
  } catch {}
}

function buildShelf(id, items, type) {
  const el = document.getElementById(id);
  if (!el) return;
  el.innerHTML = '';
  items.forEach(item => {
    const c = document.createElement('div');
    c.className = 'card';
    c.onclick = () => type === 'artist' ? openArtist(item) : openAlbum(item);
    const img = document.createElement('img');
    img.className = 'card-img' + (type === 'artist' ? ' circle' : '');
    loadImg(img, item.Id, 'Primary', 300);
    const nm = document.createElement('div');
    nm.className = 'card-name';
    nm.textContent = item.Name;
    const sb = document.createElement('div');
    sb.className = 'card-sub';
    sb.textContent = type === 'artist' ? 'Artist' : (item.ProductionYear || (item.Type === 'Playlist' ? 'Playlist' : 'Album'));
    c.append(img, nm, sb);
    el.appendChild(c);
  });
}

/* =====================================================
   LIBRARY
===================================================== */
async function prefetchLib() {
  try {
    const [a, ar, p] = await Promise.all([
      api(`/Users/${S.uid}/Items`, { IncludeItemTypes: 'MusicAlbum', Recursive: true, SortBy: 'SortName', Limit: 500 }),
      api(`/Users/${S.uid}/Items`, { IncludeItemTypes: 'MusicArtist', Recursive: true, SortBy: 'SortName', Limit: 500 }),
      api(`/Users/${S.uid}/Items`, { IncludeItemTypes: 'Playlist', Recursive: true, SortBy: 'SortName' }),
    ]);
    S.cache.albums = a.Items || [];
    S.cache.artists = ar.Items || [];
    S.cache.playlists = p.Items || [];
    if (document.getElementById('view-home').classList.contains('active')) loadHome();
    else renderLib();
  } catch(e) { loadHome(); }
}

function setLibTab(tab, btn) {
  S.libTab = tab;
  document.querySelectorAll('.lib-chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  renderLib();
}

function renderLib() {
  const el = document.getElementById('lib-list');
  const items = S.libTab === 'albums' ? S.cache.albums
    : S.libTab === 'artists' ? S.cache.artists
    : S.cache.playlists;

  if (!items.length) { el.innerHTML = '<div class="spinner"></div>'; return; }

  el.innerHTML = '';
  const isArt = S.libTab === 'artists';
  items.forEach(item => {
    const row = document.createElement('div');
    row.className = 'list-row';
    row.onclick = () => isArt ? openArtist(item) : openAlbum(item);

    const img = document.createElement('img');
    img.className = 'list-art' + (isArt ? ' circle' : '');
    loadImg(img, item.Id);

    const info = document.createElement('div');
    info.className = 'list-info';
    info.innerHTML = `<div class="list-name">${item.Name}</div><div class="list-sub">${isArt ? 'Artist' : (S.libTab === 'playlists' ? 'Playlist' : (item.ProductionYear || 'Album'))}</div>`;

    const chev = document.createElement('div');
    chev.className = 'list-chev';
    chev.innerHTML = `<svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>`;

    row.append(img, info, chev);
    el.appendChild(row);
  });
}

/* =====================================================
   ARTIST DETAIL
===================================================== */
async function openArtist(artist) {
  pushView('artist');
  const sc = document.getElementById('artist-scroll');
  sc.innerHTML = '<div class="spinner"></div>';

  try {
    const [albums, tops] = await Promise.all([
      api(`/Users/${S.uid}/Items`, {
        ArtistIds: artist.Id, IncludeItemTypes: 'MusicAlbum',
        Recursive: true, SortBy: 'ProductionYear,SortName', SortOrder: 'Descending',
      }),
      api(`/Users/${S.uid}/Items`, {
        ArtistIds: artist.Id, IncludeItemTypes: 'Audio',
        Recursive: true, SortBy: 'PlayCount', SortOrder: 'Descending',
        Limit: 5, Fields: 'RunTimeTicks,Artists,AlbumId',
      }),
    ]);

    sc.innerHTML = '';

    // Hero
    const hero = document.createElement('div');
    hero.className = 'detail-hero';
    const hbg = document.createElement('div');
    hbg.className = 'detail-hero-bg';
    hbg.style.backgroundImage = `url(${imgSrc(artist.Id,'Primary',600)})`;
    const hov = document.createElement('div');
    hov.className = 'detail-hero-overlay';
    const backBtn = document.createElement('button');
    backBtn.className = 'detail-back';
    backBtn.innerHTML = `<svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>`;
    backBtn.onclick = popView;
    const art = document.createElement('img');
    art.className = 'detail-art-float circle';
    loadImg(art, artist.Id, 'Primary', 400);
    const nm = document.createElement('div');
    nm.className = 'detail-name';
    nm.textContent = artist.Name;
    const mt = document.createElement('div');
    mt.className = 'detail-meta';
    mt.textContent = `${(albums.Items||[]).length} albums`;
    hero.append(hbg, hov, backBtn, art, nm, mt);
    sc.appendChild(hero);

    // Actions
    const acts = document.createElement('div');
    acts.className = 'detail-actions';
    acts.innerHTML = `<button class="btn-outline">Follow</button>`;
    const playFab = document.createElement('button');
    playFab.className = 'btn-play-fab';
    playFab.innerHTML = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>`;
    playFab.onclick = () => playArtistAll(artist.Id, artist.Name);
    acts.appendChild(playFab);
    sc.appendChild(acts);

    // Popular tracks
    if ((tops.Items||[]).length) {
      sc.innerHTML += `<div class="section-head" style="padding-top:8px"><span class="section-title">Popular</span></div>`;
      tops.Items.forEach((t, i) => sc.appendChild(mkTrack(t, i+1, tops.Items, 'Artist', artist.Name)));
    }

    // Albums
    if ((albums.Items||[]).length) {
      sc.innerHTML += `<div class="section-head" style="padding-top:16px"><span class="section-title">Albums</span></div><div class="shelf" id="art-albums"></div>`;
      buildShelf('art-albums', albums.Items, 'album');
    }

  } catch(e) {
    sc.innerHTML = '<div class="empty">Could not load artist</div>';
  }
}

async function playArtistAll(id, name) {
  try {
    const t = await api(`/Users/${S.uid}/Items`, {
      ArtistIds: id, IncludeItemTypes: 'Audio',
      Recursive: true, SortBy: 'Album,SortName',
      Fields: 'RunTimeTicks,Artists,AlbumId', Limit: 300,
    });
    if (t.Items?.length) playQueue(t.Items, 0, 'Artist', name);
  } catch {}
}

/* =====================================================
   ALBUM / PLAYLIST DETAIL
===================================================== */
async function openAlbum(item) {
  pushView('album');
  const sc = document.getElementById('album-scroll');
  sc.innerHTML = '<div class="spinner"></div>';

  try {
    const isPl = item.Type === 'Playlist';
    const tracks = await api(`/Users/${S.uid}/Items`, {
      ParentId: item.Id,
      SortBy: isPl ? '' : 'IndexNumber',
      Fields: 'RunTimeTicks,Artists,AlbumId,IndexNumber',
    });

    sc.innerHTML = '';

    // Hero
    const hero = document.createElement('div');
    hero.className = 'detail-hero';
    const hbg = document.createElement('div');
    hbg.className = 'detail-hero-bg';
    hbg.style.backgroundImage = `url(${imgSrc(item.Id,'Primary',400)})`;
    const hov = document.createElement('div');
    hov.className = 'detail-hero-overlay';
    const back = document.createElement('button');
    back.className = 'detail-back';
    back.innerHTML = `<svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>`;
    back.onclick = popView;
    const art = document.createElement('img');
    art.className = 'detail-art-float';
    loadImg(art, item.Id, 'Primary', 400);
    const nm = document.createElement('div');
    nm.className = 'detail-name';
    nm.textContent = item.Name;
    const mt = document.createElement('div');
    mt.className = 'detail-meta';
    const cnt = tracks.Items?.length || 0;
    mt.textContent = isPl
      ? `Playlist · ${cnt} songs`
      : `${item.AlbumArtist || ''} · ${item.ProductionYear || ''} · ${cnt} songs`;
    hero.append(hbg, hov, back, art, nm, mt);
    sc.appendChild(hero);

    // Actions
    const acts = document.createElement('div');
    acts.className = 'detail-actions';
    const shf = document.createElement('button');
    shf.className = 'btn-shuffle-detail';
    shf.innerHTML = `<svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4h5l2 3h9M4 20h5l6-8M16.5 3.5L20 7l-3.5 3.5M16.5 16.5L20 20l-3.5 3.5"/></svg>`;
    shf.onclick = () => { if (tracks.Items?.length) { S.shuffle = true; updateShuffleUI(); playQueue(tracks.Items, 0, isPl ? 'Playlist' : 'Album', item.Name); } };
    acts.appendChild(shf);
    const fab = document.createElement('button');
    fab.className = 'btn-play-fab';
    fab.innerHTML = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>`;
    fab.onclick = () => { if (tracks.Items?.length) playQueue(tracks.Items, 0, isPl ? 'Playlist' : 'Album', item.Name); };
    acts.appendChild(fab);
    sc.appendChild(acts);

    // Tracks
    (tracks.Items || []).forEach((t, i) => {
      sc.appendChild(mkTrack(t, i+1, tracks.Items, isPl ? 'Playlist' : 'Album', item.Name, item.Id));
    });

  } catch(e) {
    sc.innerHTML = '<div class="empty">Could not load</div>';
  }
}

function mkTrack(track, num, queue, ctxType, ctxName, ctxArtId) {
  const row = document.createElement('div');
  row.className = 'track-row' + (S.track?.Id === track.Id ? ' now-playing' : '');
  row.id = `tr-${track.Id}`;

  const numEl = document.createElement('div');
  numEl.className = 'tr-num';
  if (S.track?.Id === track.Id) {
    numEl.innerHTML = `<div class="eq"><span></span><span></span><span></span></div>`;
  } else {
    numEl.textContent = num;
  }

  const art = document.createElement('img');
  art.className = 'tr-art';
  const artId = ctxArtId || track.AlbumId;
  if (artId) loadImg(art, artId, 'Primary', 100);

  const info = document.createElement('div');
  info.className = 'tr-info';
  const artists = (track.Artists||[]).join(', ') || track.AlbumArtist || '';
  info.innerHTML = `<div class="tr-name">${track.Name}</div><div class="tr-artist">${artists}</div>`;

  const dur = document.createElement('div');
  dur.className = 'tr-dur';
  dur.textContent = fmtTicks(track.RunTimeTicks);

  row.append(numEl, art, info, dur);
  row.onclick = () => {
    const idx = queue.findIndex(t => t.Id === track.Id);
    playQueue(queue, idx >= 0 ? idx : 0, ctxType, ctxName);
  };
  return row;
}

/* =====================================================
   SEARCH
===================================================== */
let searchTimer;
function onSearchInput(val) {
  clearTimeout(searchTimer);
  const body = document.getElementById('search-body');
  if (!val.trim()) { body.innerHTML = ''; renderSearchBrowse(); return; }
  document.querySelector('.genres-grid')?.remove();
  body.innerHTML = '<div class="spinner"></div>';
  searchTimer = setTimeout(() => doSearch(val), 380);
}

async function doSearch(q) {
  const body = document.getElementById('search-body');
  try {
    const res = await api(`/Users/${S.uid}/Items`, {
      SearchTerm: q,
      IncludeItemTypes: 'Audio,MusicAlbum,MusicArtist',
      Recursive: true, Limit: 40,
      Fields: 'RunTimeTicks,Artists,AlbumId',
    });
    body.innerHTML = '';
    const songs = (res.Items||[]).filter(i => i.Type === 'Audio');
    const albums = (res.Items||[]).filter(i => i.Type === 'MusicAlbum');
    const artists = (res.Items||[]).filter(i => i.Type === 'MusicArtist');

    if (!res.Items?.length) { body.innerHTML = '<div class="empty">No results found</div>'; return; }

    if (songs.length) {
      const h = document.createElement('div'); h.className = 'section-head'; h.innerHTML = `<span class="section-title">Songs</span>`;
      body.appendChild(h);
      songs.slice(0,10).forEach((t,i) => body.appendChild(mkTrack(t,i+1,songs,'Search',q)));
    }
    if (albums.length) {
      const h = document.createElement('div'); h.className = 'section-head'; h.style.paddingTop='16px'; h.innerHTML = `<span class="section-title">Albums</span>`;
      body.appendChild(h);
      albums.slice(0,8).forEach(a => {
        const row = document.createElement('div');
        row.className = 'list-row'; row.onclick = () => openAlbum(a);
        const img = document.createElement('img'); img.className = 'list-art'; loadImg(img, a.Id);
        row.append(img);
        row.innerHTML += `<div class="list-info"><div class="list-name">${a.Name}</div><div class="list-sub">Album · ${a.ProductionYear||''}</div></div>`;
        body.appendChild(row);
      });
    }
    if (artists.length) {
      const h = document.createElement('div'); h.className = 'section-head'; h.style.paddingTop='16px'; h.innerHTML = `<span class="section-title">Artists</span>`;
      body.appendChild(h);
      artists.slice(0,6).forEach(a => {
        const row = document.createElement('div');
        row.className = 'list-row'; row.onclick = () => openArtist(a);
        const img = document.createElement('img'); img.className = 'list-art circle'; loadImg(img, a.Id);
        row.append(img);
        row.innerHTML += `<div class="list-info"><div class="list-name">${a.Name}</div><div class="list-sub">Artist</div></div>`;
        body.appendChild(row);
      });
    }
  } catch {
    body.innerHTML = '<div class="empty">Search failed</div>';
  }
}

const GENRE_COLORS = ['#E13300','#148A08','#006450','#1E3264','#E8115B','#777','#BC5900','#0D73EC','#509BF5','#AF2896','#1DB954','#2D4DD8'];
async function renderSearchBrowse() {
  const body = document.getElementById('search-body');
  if (body.querySelector('.genres-grid')) return;
  body.innerHTML = '';
  try {
    const g = await api('/Genres', { UserId: S.uid, IncludeItemTypes: 'Audio', Recursive: true, Limit: 12 });
    const grid = document.createElement('div');
    grid.className = 'genres-grid';
    (g.Items||[]).forEach((genre, i) => {
      const p = document.createElement('div');
      p.className = 'genre-pill';
      p.style.background = GENRE_COLORS[i % GENRE_COLORS.length];
      p.innerHTML = `<div class="genre-pill-name">${genre.Name}</div>`;
      p.onclick = () => { document.getElementById('s-input').value = genre.Name; onSearchInput(genre.Name); };
      grid.appendChild(p);
    });
    body.appendChild(grid);
  } catch {}
}

/* =====================================================
   PLAYBACK
===================================================== */
function playQueue(tracks, startIdx, ctxType, ctxName) {
  S.queue = tracks;
  S.ctxType = ctxType || '';
  S.ctxName = ctxName || '';
  playIdx(startIdx);
}

function playIdx(idx) {
  if (idx < 0 || idx >= S.queue.length) return;
  S.qIdx = idx;
  const t = S.queue[idx];
  S.track = t;
  audio.src = audioUrl(t.Id);
  audio.play().catch(() => {});
  updateNowPlayingUI();
  refreshTrackRows();
}

function updateNowPlayingUI() {
  const t = S.track;
  if (!t) return;
  const artists = (t.Artists||[]).join(', ') || t.AlbumArtist || '';
  const artId = t.AlbumId || t.ParentId;
  const artUrl = artId ? imgSrc(artId,'Primary',500) : '';

  // Player
  document.getElementById('p-track').textContent = t.Name;
  document.getElementById('p-artist').textContent = artists;
  document.getElementById('p-from').textContent = 'Playing from ' + (S.ctxType||'').toLowerCase();
  document.getElementById('p-ctx-name').textContent = S.ctxName;
  document.getElementById('p-art').src = artUrl;
  document.getElementById('p-art').onerror = () => document.getElementById('p-art').src = '';
  document.getElementById('player-bg').style.backgroundImage = artUrl ? `url(${artUrl})` : 'none';
  document.getElementById('p-art').classList.add('playing');

  // Mini
  document.getElementById('mini-title').textContent = t.Name;
  document.getElementById('mini-artist').textContent = artists;
  document.getElementById('mini-art').src = artId ? imgSrc(artId,'Primary',100) : '';
  document.getElementById('mini-art').onerror = () => {};
  document.getElementById('mini-player').classList.add('visible');

  updateQueueUI();
}

function updateQueueUI() {
  const el = document.getElementById('p-queue');
  el.innerHTML = '';
  const next = S.queue.slice(S.qIdx + 1, S.qIdx + 5);
  next.forEach((t, i) => {
    const row = document.createElement('div');
    row.className = 'queue-row';
    row.onclick = () => playIdx(S.qIdx + 1 + i);
    const img = document.createElement('img');
    img.className = 'queue-art';
    const aid = t.AlbumId || t.ParentId;
    if (aid) loadImg(img, aid, 'Primary', 80);
    const info = document.createElement('div');
    info.innerHTML = `<div class="queue-name">${t.Name}</div><div class="queue-artist">${(t.Artists||[]).join(', ')||t.AlbumArtist||''}</div>`;
    row.append(img, info);
    el.appendChild(row);
  });
}

function refreshTrackRows() {
  document.querySelectorAll('.track-row').forEach(r => r.classList.remove('now-playing'));
  if (S.track) {
    const el = document.getElementById(`tr-${S.track.Id}`);
    if (el) {
      el.classList.add('now-playing');
      el.querySelector('.tr-num').innerHTML = `<div class="eq"><span></span><span></span><span></span></div>`;
    }
  }
}

function updatePlayIcons() {
  const paused = audio.paused;
  const playPath = paused ? 'M8 5v14l11-7z' : 'M6 19h4V5H6v14zm8-14v14h4V5h-4z';
  document.getElementById('ctrl-play-icon').innerHTML = `<path d="${playPath}"/>`;
  document.getElementById('mini-play-icon').innerHTML = `<path d="${playPath}"/>`;
  const pArt = document.getElementById('p-art');
  paused ? pArt.classList.remove('playing') : pArt.classList.add('playing');
}

function togglePlay() {
  if (!S.track) return;
  audio.paused ? audio.play() : audio.pause();
}

function nextTrack() {
  let ni = S.qIdx + 1;
  if (S.shuffle) ni = Math.floor(Math.random() * S.queue.length);
  if (ni >= S.queue.length) { if (S.repeat === 'all') ni = 0; else return; }
  playIdx(ni);
}

function prevTrack() {
  if (audio.currentTime > 3) { audio.currentTime = 0; return; }
  let pi = S.qIdx - 1;
  if (pi < 0) pi = S.repeat === 'all' ? S.queue.length - 1 : 0;
  playIdx(pi);
}

function toggleShuffle() {
  S.shuffle = !S.shuffle;
  updateShuffleUI();
}
function updateShuffleUI() {
  document.getElementById('ctrl-shuffle').classList.toggle('on', S.shuffle);
}

function toggleRepeat() {
  const modes = ['off','all','one'];
  S.repeat = modes[(modes.indexOf(S.repeat) + 1) % 3];
  const btn = document.getElementById('ctrl-repeat');
  btn.classList.toggle('on', S.repeat !== 'off');
}

function toggleLike() {
  const btn = document.getElementById('p-like');
  const icon = document.getElementById('p-like-icon');
  btn.classList.toggle('on');
  icon.setAttribute('fill', btn.classList.contains('on') ? 'currentColor' : 'none');
}

function seekClick(e) {
  if (!audio.duration) return;
  const r = e.currentTarget.getBoundingClientRect();
  audio.currentTime = ((e.clientX - r.left) / r.width) * audio.duration;
}

function setVol(e) {
  const r = e.currentTarget.getBoundingClientRect();
  const v = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width));
  audio.volume = v;
  document.getElementById('vol-fill').style.width = (v*100) + '%';
}

// Audio events
audio.addEventListener('play', updatePlayIcons);
audio.addEventListener('pause', updatePlayIcons);
audio.addEventListener('ended', () => {
  if (S.repeat === 'one') { audio.currentTime = 0; audio.play(); return; }
  nextTrack();
});
audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  const pct = (audio.currentTime / audio.duration) * 100;
  document.getElementById('p-fill').style.width = pct + '%';
  document.getElementById('mini-prog').style.width = pct + '%';
  document.getElementById('p-cur').textContent = fmtSecs(audio.currentTime);
  document.getElementById('p-dur').textContent = fmtSecs(audio.duration);
});
audio.addEventListener('error', () => setTimeout(nextTrack, 1200));

/* =====================================================
   BOOT HOME
===================================================== */
// Override gotoTab to load home data
const _gotoTab = gotoTab;
window.gotoTab = function(tab) {
  _gotoTab(tab);
  if (tab === 'home') loadHome();
};
